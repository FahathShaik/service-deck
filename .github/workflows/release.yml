name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            task: packageDeb
            artifact_name: ServiceDeck-linux.deb
            artifact_path: composeApp/build/compose/binaries/main/deb/*.deb
          - os: windows-latest
            task: packageMsi
            artifact_name: ServiceDeck-windows.msi
            artifact_path: composeApp/build/compose/binaries/main/msi/*.msi
          - os: macos-latest
            task: packageDmg
            artifact_name: ServiceDeck-macos.dmg
            artifact_path: composeApp/build/compose/binaries/main/dmg/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build Package
        run: ./gradlew :composeApp:${{ matrix.task }} --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
